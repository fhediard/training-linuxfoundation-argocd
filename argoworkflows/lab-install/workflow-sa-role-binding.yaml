# Bind the standard role to the SA — pick the level that fits
#!!! CREATED BY DEFAULT BY THE HELM CHART !!!
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-binding
  namespace: argo-workflows
subjects:
  - kind: ServiceAccount
    name: argo-workflow
    namespace: argo-workflows
roleRef:
  kind: Role
  name: argo-workflows-workflow   # swap with executor or standard as needed
  apiGroup: rbac.authorization.k8s.io