---
# ─────────────────────────────────────────────
# LEVEL 2 — Common additions
# Needed for artifacts, logs, and inter-step
# communication in most real workflows
# ─────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-standard
  namespace: argo-workflows
rules:
  # Minimum: report results back to the controller
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch"]

  # Read own pod info and other workflow step pods
  # Needed for: log tailing, wait containers,
  # passing outputs between steps
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "watch", "patch"]

  # Read pod logs (e.g. capture stdout as output parameter)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "watch"]

  # Read secrets (e.g. artifact repo credentials,
  # S3 keys, git credentials)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]

  # Read configmaps (e.g. workflow config,
  # environment-specific settings)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
